name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validate stack
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install exporter dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r exporters/traffic_exporter/requirements.txt
          python -m pip install -r exporters/hardware_telemetry_replay/requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Create CI environment file
        run: |
          cp .env.example .env
          sed -i 's/EC2_A_PRIVATE_IP=.*/EC2_A_PRIVATE_IP=127.0.0.1/' .env
          sed -i 's/EC2_B_PRIVATE_IP=.*/EC2_B_PRIVATE_IP=127.0.0.1/' .env
          sed -i 's/GRAFANA_DOMAIN=.*/GRAFANA_DOMAIN=localhost/' .env
          sed -i 's|GRAFANA_ROOT_URL=.*|GRAFANA_ROOT_URL=http://localhost:3000/|' .env

      - name: Validate stack
        run: ./scripts/validate_stack.sh